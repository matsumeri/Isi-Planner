<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="256" rx="110" fill="url(#shine)"/>
  <!-- Moneda principal -->
  <circle cx="256" cy="230" r="130" fill="#ffffff" opacity="0.12"/>
  <circle cx="256" cy="230" r="100" fill="#ffffff" opacity="0.18"/>
  <!-- Símbolo $ -->
  <text x="256" y="280" font-family="Arial Black, sans-serif" font-size="190" font-weight="900"
        text-anchor="middle" fill="#ffffff">$</text>
  <!-- Barras de gráfico en la parte inferior -->
  <rect x="100" y="370" width="40" height="80" rx="6" fill="#ffffff" opacity="0.6"/>
  <rect x="160" y="340" width="40" height="110" rx="6" fill="#ffffff" opacity="0.8"/>
  <rect x="220" y="355" width="40" height="95" rx="6" fill="#ffffff" opacity="0.7"/>
  <rect x="280" y="320" width="40" height="130" rx="6" fill="#ffffff" opacity="0.9"/>
  <rect x="340" y="345" width="40" height="105" rx="6" fill="#ffffff" opacity="0.75"/>
  <rect x="400" y="365" width="40" height="85" rx="6" fill="#ffffff" opacity="0.65"/>
</svg>
